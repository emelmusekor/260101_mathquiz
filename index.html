<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Math Quiz Chat</title>
  <link rel="stylesheet" href="style.css" />

  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script defer src="database/moods.js"></script>
  <script defer src="database/questions_level_1.js"></script>
  <script defer src="database/questions_level_2.js"></script>
  <script defer src="database/questions_level_3.js"></script>
  <script defer src="database/questions_level_4.js"></script>
  <script defer src="database/questions_level_5.js"></script>
  <script defer src="database/questions_level_6.js"></script>
  <script defer src="database/questions_level_7.js"></script>
  <script defer src="database/questions_level_8.js"></script>
  <script defer src="database/questions_level_9.js"></script>
  <script defer src="database/questions_level_10.js"></script>

  <script defer src="app.js"></script>
  <script defer src="chat.js"></script>
</head>
<body>
  <div id="app-container">
    <aside id="chat-sidebar" class="glass-card">
      <h2 class="chat-title">Live Chat</h2>

      <div class="chat-nickname-box">
        <input
          type="text"
          id="chat-nickname"
          placeholder="Nickname (max 8)"
          maxlength="8"
        />
      </div>

      <div id="chat-messages" class="chat-messages">
        <div class="chat-info">Connecting to chat server...</div>
      </div>

      <form id="chat-form" class="chat-input-box">
        <input
          type="text"
          id="chat-input"
          placeholder="Type a message"
          autocomplete="off"
          disabled
        />
        <button type="submit" id="btn-chat-send" disabled>Send</button>
      </form>
    </aside>

    <main id="quiz-main">
      <div id="screen-mood" class="glass-card screen active">
        <h1>How do you feel today?</h1>
        <p>Pick the mood that feels closest to you right now.</p>
        <div id="moods-container" class="btn-grid"></div>
      </div>

      <div id="screen-quote" class="glass-card screen">
        <div style="font-size: 3rem; text-align: center; margin-bottom: 10px;" id="quote-emoji">:)</div>
        <h2>A note for you</h2>
        <p id="quote-box" class="quote-box">Loading a message...</p>
        <p id="message-box">Getting a short message for your mood.</p>
        <button id="btn-start-quiz" class="btn btn-primary">Start Quiz</button>
      </div>

      <div id="screen-quiz" class="glass-card screen">
        <div class="status-bar">
          <span id="difficulty-badge" class="badge">Level: 5</span>
          <span id="combo-badge" class="badge combo">COMBO: 0 / 3</span>
        </div>

        <h2 id="quiz-title">Loading question...</h2>
        <div id="options-container" class="options-container"></div>

        <div id="short-answer-container" style="display: none; width: 100%;">
          <input type="number" id="short-input" placeholder="Enter a number" />
          <button id="btn-submit-short" class="btn btn-primary" style="margin-top: 10px;">Check Answer</button>
        </div>

        <div id="feedback-box" class="feedback-box" style="display: none;"></div>
      </div>

      <div id="screen-result" class="glass-card screen">
        <h1>Three in a row!</h1>

        <div id="empathy-message-box" class="empathy-message"></div>

        <div class="result-history">
          <h3>Answer History</h3>
          <ul id="history-list"></ul>
        </div>

        <button id="btn-restart" class="btn btn-primary">Restart</button>
      </div>
    </main>
  </div>
</body>
</html>
